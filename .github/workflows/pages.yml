name: Deploy Jekyll with Static Subsite

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Build the Jekyll site
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # 2. MANUALLY COPY the subsite into the final output folder
      - name: Copy Subsite to output
        run: |
          mkdir -p ./_site/subsites/LadeinfrastrukturSim
          cp -r ./subsites/LadeinfrastrukturSim/* ./_site/subsites/LadeinfrastrukturSim/

      # 3. Upload the final folder
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
